<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1320"/>
      <stop offset="0.55" stop-color="#101B2E"/>
      <stop offset="1" stop-color="#1E2A1F"/>
    </linearGradient>
    <linearGradient id="card" x1="250" y1="120" x2="1130" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A27"/>
      <stop offset="1" stop-color="#0D1420"/>
    </linearGradient>
    <linearGradient id="badge1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#46C98C"/>
      <stop offset="1" stop-color="#1E9D72"/>
    </linearGradient>
    <linearGradient id="badge2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2B94B"/>
      <stop offset="1" stop-color="#D68624"/>
    </linearGradient>
    <filter id="shadow" x="180" y="70" width="1040" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#02060D" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1160" cy="110" r="230" fill="#1F7A57" fill-opacity="0.12"/>
  <circle cx="170" cy="760" r="260" fill="#E6A93A" fill-opacity="0.08"/>
  <circle cx="1270" cy="760" r="180" fill="#3D9BF5" fill-opacity="0.08"/>

  <text x="116" y="112" fill="#F5F7FB" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">
    Music Catalog Bootstrap
  </text>
  <text x="116" y="162" fill="#B6C2D6" font-family="Segoe UI, sans-serif" font-size="28">
    Bootstrap a music service catalog from MusicBrainz dumps.
  </text>

  <g filter="url(#shadow)">
    <rect x="230" y="205" width="940" height="565" rx="28" fill="url(#card)" stroke="#273246" stroke-width="2"/>
  </g>

  <rect x="230" y="205" width="940" height="58" rx="28" fill="#151F2F"/>
  <circle cx="273" cy="234" r="8" fill="#F16C7A"/>
  <circle cx="302" cy="234" r="8" fill="#F2B94B"/>
  <circle cx="331" cy="234" r="8" fill="#46C98C"/>
  <text x="378" y="242" fill="#D6DEEA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">
    catalog bootstrap fixtures/sample_releases.csv fixtures/sample-target.properties --data-dir .catalog-data
  </text>

  <text x="278" y="318" fill="#F4F7FB" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">
    Bootstrap summary
  </text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">
    <text x="278" y="372" fill="#8FA2BE">Mode:</text>
    <text x="486" y="372" fill="#46C98C">dry-run</text>
    <text x="278" y="410" fill="#8FA2BE">Input rows:</text>
    <text x="486" y="410" fill="#F4F7FB">5</text>
    <text x="278" y="448" fill="#8FA2BE">AUTO_CREATE:</text>
    <text x="486" y="448" fill="#46C98C">3</text>
    <text x="278" y="486" fill="#8FA2BE">AUTO_MATCH:</text>
    <text x="486" y="486" fill="#52B6FF">0</text>
    <text x="278" y="524" fill="#8FA2BE">REVIEW:</text>
    <text x="486" y="524" fill="#F2B94B">1</text>
    <text x="278" y="562" fill="#8FA2BE">FAILURE:</text>
    <text x="486" y="562" fill="#F16C7A">1</text>
  </g>

  <rect x="672" y="330" width="424" height="286" rx="22" fill="#0E1623" stroke="#283449"/>
  <text x="706" y="375" fill="#F4F7FB" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700">
    review-summary.txt
  </text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
    <text x="706" y="422" fill="#B9C5D8">Rows requiring review: 2</text>
    <text x="706" y="464" fill="#F2B94B">REVIEW:SAME_ARTIST_TITLE_DIFFERENT_DATE: 1</text>
    <text x="706" y="504" fill="#F16C7A">FAILURE:MISSING_REQUIRED_FIELD: 1</text>
    <text x="706" y="558" fill="#8FA2BE">candidate #2</text>
    <text x="846" y="558" fill="#F4F7FB">Radiohead / OK Computer / 1997-05-21</text>
  </g>

  <rect x="278" y="649" width="194" height="54" rx="27" fill="url(#badge1)"/>
  <text x="320" y="684" fill="#08130E" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">
    dry-run first
  </text>

  <rect x="495" y="649" width="240" height="54" rx="27" fill="url(#badge2)"/>
  <text x="532" y="684" fill="#1E1405" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">
    review uncertain rows
  </text>

  <rect x="760" y="649" width="184" height="54" rx="27" fill="#1E293B" stroke="#3F4F68"/>
  <text x="803" y="684" fill="#E7EDF7" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">
    apply or export
  </text>

  <text x="116" y="842" fill="#B6C2D6" font-family="Segoe UI, sans-serif" font-size="24">
    A safer bootstrap step between MusicBrainz dumps and your music service schema.
  </text>
</svg>
