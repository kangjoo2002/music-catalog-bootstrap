name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - '3.10'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          sh ./catalog bootstrap fixtures/sample_releases.csv fixtures/sample-target.properties --data-dir .catalog-data-ci
          sh ./catalog bootstrap fixtures/sample_releases.csv fixtures/sample-target.properties --data-dir .catalog-data-ci --export-sql out/catalog.sql

      - name: Smoke test on Windows
        if: runner.os == 'Windows'
        run: |
          .\catalog.bat bootstrap fixtures\sample_releases.csv fixtures\sample-target.properties --data-dir .catalog-data-ci
          .\catalog.bat bootstrap fixtures\sample_releases.csv fixtures\sample-target.properties --data-dir .catalog-data-ci --export-sql out\catalog.sql

      - name: Build release ZIP
        run: python scripts/build-release.py

      - name: Smoke test release ZIP
        run: python scripts/smoke-release.py

  apply-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install package with apply extras
        run: python -m pip install -e ".[apply]"

      - name: Run PostgreSQL apply smoke
        shell: pwsh
        run: ./scripts/smoke-apply.ps1 -Engine postgresql -Cleanup

      - name: Run MySQL apply smoke
        shell: pwsh
        run: ./scripts/smoke-apply.ps1 -Engine mysql -Cleanup
